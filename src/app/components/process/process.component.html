<section class="process-section">
  <div class="section-header reveal">
    <p class="section-eyebrow">¿Comó trabajamos?</p>
    <h2 class="section-title">Del <em>Cultivo</em> a tus manos</h2>
  </div>
  <div class="process-grid">
    <div class="process-card reveal" [class]="'process-card reveal reveal-delay-' + (i+1)"
         *ngFor="let step of steps; let i = index">
      <div class="process-num">{{ step.num }}</div>
      <div class="process-icon">{{ step.icon }}</div>
      <div class="process-title">{{ step.title }}</div>
      <p class="process-desc">{{ step.desc }}</p>
    </div>
  </div>
</section>
