<nav class="pagination" *ngIf="totalPages > 1" aria-label="Product pages">

  <!-- Results count -->
  <div class="pagination-info">
    <span class="pagination-info-text">
      Mostrando <em>{{ startItem }}–{{ endItem }}</em> de <em>{{ totalElements }}</em> productos
    </span>
  </div>

  <!-- Controls -->
  <div class="pagination-controls">

    <!-- Prev -->
    <button
      class="pg-btn pg-btn--arrow"
      [class.disabled]="currentPage === 0"
      [disabled]="currentPage === 0"
      (click)="prev()"
      aria-label="Página anterior">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M9 2.5L4.5 7L9 11.5" stroke="currentColor" stroke-width="1.5"
              stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>

    <!-- Page numbers -->
    <div class="pg-numbers">
      <ng-container *ngFor="let page of pages">
        <button
          *ngIf="!isEllipsis(page)"
          class="pg-btn pg-btn--num"
          [class.active]="page === currentPage"
          (click)="go(page)"
          [attr.aria-label]="'Página ' + (+page + 1)"
          [attr.aria-current]="page === currentPage ? 'page' : null">
          {{ +page + 1 }}
        </button>
        <span *ngIf="isEllipsis(page)" class="pg-ellipsis" aria-hidden="true">…</span>
      </ng-container>
    </div>

    <!-- Next -->
    <button
      class="pg-btn pg-btn--arrow"
      [class.disabled]="currentPage === totalPages - 1"
      [disabled]="currentPage === totalPages - 1"
      (click)="next()"
      aria-label="Página siguiente">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M5 2.5L9.5 7L5 11.5" stroke="currentColor" stroke-width="1.5"
              stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>

  </div>

  <!-- Page progress bar -->
  <div class="pagination-progress" aria-hidden="true">
    <div class="pagination-progress-line">
      <div
        class="pagination-progress-fill"
        [style.width.%]="((currentPage + 1) / totalPages) * 100">
      </div>
    </div>
    <span class="pagination-progress-label">
      {{ currentPage + 1 }} / {{ totalPages }}
    </span>
  </div>

</nav>
