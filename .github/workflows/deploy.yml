name: Deploy Angular App to HostGator

on:
  push:
    branches:
      - main # Change this if your default branch is named 'master'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Use the Node version compatible with your Angular version

      - name: Install Dependencies
        run: npm ci

      - name: Build Angular Project
        run: npm run build -- --configuration production

      - name: Deploy via FTP to HostGator
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # Because of your angular.json, your static files are output here:
          local-dir: ./dist/frontend_florist/browser/
          # Deploy to the root of the FTP account's designated folder:
          server-dir: ./
